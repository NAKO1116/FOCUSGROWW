<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusGrow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>

    <div class="logo">

        <img
            src="logo.png"
            class="logo-image">

    </div>

    <button id="helpBtn" class="help-btn">
        ⓘ
    </button>

</header>

<main>

    <aside class="left-panel">

        <h2>継続記録・成長記録</h2>

        <div class="card">

            <h3>連続作業日数</h3>

            <div class="days" id="streakDays">
                1日
            </div>

            <p id="bestRecord">
                ベスト記録：1日
            </p>

        </div>

        <div class="card growth-card">

           <h3>🌱 成長の記録</h3>

          <p id="levelText">
              ミーネ Lv.1
          </p>

          <div class="progress">

              <div
                  id="evolutionBar"
                  class="progress-fill">
              </div>

          </div>

          <p id="evolutionText">

              0 / 3 回

          </p>

          <p id="nextEvolution" class="next-evolution">

              ✨ あと3回集中で進化！

          </p>

        </div>
 
        <div class="card">

          <h3>集中時間</h3>

            <p id="longestFocus">
                最長集中：00:00
            </p>

            <p id="todayFocus">
               今日：00:00
           </p>

           <p id="weekFocus">
              今週：00:00
           </p>

        </div>

    </aside>

<section class="center-panel">

    <div class="character-stage">

        <div id="completeMessage" class="complete-message">
           🎉 5分達成！追加時間を計測中...
        </div>

        <div id="timer" class="timer">
            05:00
        </div>

        <div class="character">
            <img
                id="character"
                src="character1.png"
                alt="character">
        </div>

        <div class="timer-buttons">

            <button id="startBtn">
                スタート
            </button>

            <button id="resetBtn">
                リセット
            </button>

        </div>

    </div>

</section>

    <aside class="right-panel">

    <h2>ToDoリスト</h2>

    <!-- ToDo -->
    <div class="card todo-card">

        <h3>ToDoリスト</h3>

        <div class="todo-input-area">

            <input
                type="text"
                id="todoInput"
                placeholder="やること">

            <button id="addTodoBtn">
                追加
            </button>

        </div>

        <ul id="todoList"></ul>

    </div>

    <div class="right-section"></div>

    <h2>成長の共有</h2>

    <!-- シェア -->
    <div class="card share-card" id="shareCard">

        <h3>共有内容</h3>

        <p id="shareLevel">
            Lv.1
        </p>

        <p id="shareForm">
            ミーネ
        </p>

        <hr>

        <p id="shareBest">
            最高連続作業日数：0日
        </p>

        <p id="shareLongest">
            最長集中時間：0分0秒
        </p>

        <button
            id="shareBtn"
            class="share-btn">

            シェア

        </button>

    </div>

</aside>

</main>

<footer>

    <button
       id="bgmBtn"
       class="footer-btn">
       🎵BGM ON
    </button>

</footer>

<audio
id="alarmSound"
src="alarm.mp3">
</audio>

<audio
    id="bgm"
    src="bgm.mp3"
    loop>
</audio>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="script.js"></script>

</body>
</html>
